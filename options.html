<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Extension Options</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      .input-field {
        display: block;
        margin-bottom: 10px;
      }
      .save-button {
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .save-button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <h1>Extension Options</h1>
    <label class="input-field">
      <input type="radio" name="apiOption" value="own" checked /> Use your own
      OpenAI API key:
    </label>
    <input type="text" id="apiKey" class="input-field" />

    <label class="input-field">
      <input type="radio" name="apiOption" value="provided" /> Use provided key
      (testing only)
    </label>

    <hr style="margin: 20px 0" />

    <h2>Detection Mode</h2>
    <label class="input-field">
      <input type="radio" name="detectionMode" value="ondevice" checked /> On-Device LLM (Ollama)
    </label>
    <label class="input-field">
      <input type="radio" name="detectionMode" value="cloud" /> Cloud LLM (OpenAI)
    </label>
    <label class="input-field">
      <input type="radio" name="detectionMode" value="presidio" /> Presidio (no LLM)
    </label>

    <div id="ollamaSection">
      <h3>Ollama Settings</h3>
      <label class="input-field">
        Model name:
        <input type="text" id="ollamaModel" class="input-field" placeholder="llama3" />
      </label>
    </div>

    <div id="presidioSection" style="display:none">
      <h3>Presidio Settings</h3>
      <p style="font-size: 0.9em; color: #666;">
        Requires the Presidio server running locally.<br/>
        Run: <code>python presidio_server.py</code> (port 5002)
      </p>
    </div>

    <button id="saveButton" class="save-button">Save</button>

    <script src="options.js"></script>
  </body>
</html>
